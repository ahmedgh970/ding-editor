# Default configuration for ding.runner.evaluate_img_dataset

defaults:
  - _self_

hydra:
  run:
    dir: outputs/evaluate_img/${now:%Y%m%d_%H%M%S}

output_dir: ${hydra:run.dir}
device: cuda:0
seed: 42

experiment:
  denoiser: flux
  sampler: ding
  steps: 50
  guidance_scale: 3.0

data:
  gt_dir: /path/to/ground_truth_images
  gen_dir: /path/to/generated_images
  metadata_path: ${data.gt_dir}/metadata.json
  max_images: null

metrics:
  compute_fid: true
  compute_patch_fid: true
  compute_edit_patch_fid: true
  pfid_patch_size: 256
  n_random_patches: 10
  pfid_min_edited_frac: 0.25

io:
  metrics_filename: metrics.json
  summary_filename: summary.json
